name: Bug report
description: Report a reproducible bug in react-devtool-cli
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please reduce the report to a minimal reproduction. Environment-sensitive bugs need exact versions and commands.
  - type: input
    id: version
    attributes:
      label: react-devtool-cli version
      description: Output of `rdt --version`
      placeholder: 0.2.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js, browser, React version, app stack, and transport mode
      placeholder: |
        Windows 11
        Node.js 22.11.0
        Chromium via session open
        Next.js 16 + React 19
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact commands and steps to reproduce
      placeholder: |
        1. rdt session open ...
        2. rdt profiler start ...
        3. rdt interact click ...
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, runtime warnings, or anything that narrows the issue
